<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>FocIA</title>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
        }
      }
    </script>

    <link rel="stylesheet" href="../src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header id="board-layout-nav" class="board-layout-nav">
        <h1>FocIA</h1>
      </header>

      <main id="board-layout-main" class="board-layout-main">
        <div class="board-stage">
          <section id="board-layout-focusboard" class="board-layout-focusboard">
            <div id="board" class="board-single"></div>
          </section>

          <aside id="board-layout-sidebar" class="board-layout-sidebar">
            <section class="sidebar-panel">
              <h2>Turn</h2>
              <p id="turn-info">Red</p>
            </section>

            <section class="sidebar-panel">
              <h2>Selection</h2>
              <p id="selection-info">None</p>
            </section>

            <section class="sidebar-panel">
              <h2>Moves</h2>
              <ul id="moves-list" class="moves-list"></ul>
            </section>

            <section class="sidebar-panel">
              <h2>Reserve</h2>
              <p id="reserve-info-red">Red: 0</p>
              <p id="reserve-info-green">Green: 0</p>
            </section>
          </aside>
        </div>
      </main>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
